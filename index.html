<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Launchpad — Beta</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚀</text></svg>">
  <meta name="description" content="A central hub for all Nafis web apps and tools." />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@700;800&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-from: #0d0d1a;
      --bg-to: #0a1628;
      --glass: rgba(255, 255, 255, 0.06);
      --glass-border: rgba(255, 255, 255, 0.12);
      --glass-hover: rgba(255, 255, 255, 0.11);
      --text: #e8eaf6;
      --sub: #8892a4;
      --accent: #6c63ff;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, var(--bg-from), var(--bg-to));
      font-family: 'Inter', sans-serif;
      color: var(--text);
      overflow-x: hidden;
    }

    /* ── Animated background blobs ── */
    .bg-blobs {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      animation: drift 14s ease-in-out infinite alternate;
    }

    .blob:nth-child(1) {
      width: 520px;
      height: 520px;
      background: #6c63ff;
      top: -120px;
      left: -100px;
      animation-delay: 0s;
    }

    .blob:nth-child(2) {
      width: 380px;
      height: 380px;
      background: #00bcd4;
      bottom: -60px;
      right: -80px;
      animation-delay: -5s;
    }

    .blob:nth-child(3) {
      width: 300px;
      height: 300px;
      background: #ff5fa0;
      top: 40%;
      left: 55%;
      animation-delay: -9s;
    }

    @keyframes drift {
      from {
        transform: translateY(0) scale(1);
      }

      to {
        transform: translateY(40px) scale(1.08);
      }
    }

    /* ── Layout ── */
    .container {
      position: relative;
      z-index: 1;
      max-width: 960px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    /* ── Header ── */
    header {
      text-align: center;
      margin-bottom: 56px;
    }

    .beta-badge {
      display: inline-block;
      background: linear-gradient(135deg, #6c63ff, #00bcd4);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 4px 14px;
      border-radius: 20px;
      margin-bottom: 18px;
      box-shadow: 0 0 20px rgba(108, 99, 255, 0.45);
    }

    h1 {
      font-family: 'Outfit', sans-serif;
      font-size: clamp(2.2rem, 6vw, 3.4rem);
      font-weight: 800;
      background: linear-gradient(135deg, #a78bfa, #67e8f9, #f472b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.15;
      letter-spacing: -0.5px;
    }

    .subtitle {
      margin-top: 12px;
      color: var(--sub);
      font-size: 0.95rem;
      font-weight: 400;
    }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 20px;
    }

    /* ── App Card ── */
    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 28px 16px 22px;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      cursor: pointer;
      text-decoration: none;
      color: var(--text);
      transition: transform 0.22s ease, background 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.04), transparent);
      border-radius: inherit;
    }

    .card:hover {
      transform: translateY(-7px) scale(1.03);
      background: var(--glass-hover);
      border-color: rgba(255, 255, 255, 0.22);
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.35), 0 0 0 1px rgba(255, 255, 255, 0.08);
    }

    .card:active {
      transform: translateY(-3px) scale(1.01);
    }

    /* ── Icon ── */
    .icon-wrap {
      width: 64px;
      height: 64px;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      position: relative;
      transition: transform 0.22s ease;
    }

    .card:hover .icon-wrap {
      transform: scale(1.1) rotate(-3deg);
    }

    /* Per-card gradient colours */
    .ic-channel {
      background: linear-gradient(135deg, #ff6b6b, #ee0979);
    }

    .ic-webcam {
      background: linear-gradient(135deg, #36d1dc, #5b86e5);
    }

    .ic-nfc {
      background: linear-gradient(135deg, #56ab2f, #a8e063);
    }

    .ic-openworld {
      background: linear-gradient(135deg, #614385, #516395);
    }

    .ic-speech {
      background: linear-gradient(135deg, #f7971e, #ffd200);
    }

    .ic-education {
      background: linear-gradient(135deg, #6c63ff, #a78bfa);
    }

    .ic-maq {
      background: linear-gradient(135deg, #0f3460, #533483);
    }

    .ic-pmc {
      background: linear-gradient(135deg, #11998e, #38ef7d);
    }

    .ic-ngo {
      background: linear-gradient(135deg, #c94b4b, #4b134f);
    }

    .ic-bangla {
      background: linear-gradient(135deg, #00b4db, #0083b0);
    }

    .ic-wish {
      background: linear-gradient(135deg, #f953c6, #b91d73);
    }

    .card-name {
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.3px;
      text-align: center;
      line-height: 1.3;
      color: #d1d5e8;
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      margin-top: 64px;
      color: var(--sub);
      font-size: 0.8rem;
    }

    footer span {
      color: #f472b6;
    }
  </style>
</head>

<body>

  <div class="bg-blobs">
    <div class="blob"></div>
    <div class="blob"></div>
    <div class="blob"></div>
  </div>

  <div class="container">
    <header>
      <div class="beta-badge">Beta</div>
      <h1>Launchpad</h1>
      <p class="subtitle">All your apps, in one place.</p>
    </header>

    <div class="grid">

      <a class="card" href="https://abidalnafis.github.io/channel/index.html" target="_blank" id="card-channel">
        <div class="icon-wrap ic-channel">📺</div>
        <span class="card-name">Channel</span>
      </a>

      <a class="card" href="https://abidalnafis.github.io/education/liveCamera.html" target="_blank" id="card-webcam">
        <div class="icon-wrap ic-webcam">📷</div>
        <span class="card-name">WebCam</span>
      </a>

      <a class="card" href="https://abidalnafis.github.io/education/nfc.html" target="_blank" id="card-nfc">
        <div class="icon-wrap ic-nfc">📶</div>
        <span class="card-name">NFC</span>
      </a>

      <a class="card" href="https://abidalnafis.github.io/education/openworld.html" target="_blank" id="card-openworld">
        <div class="icon-wrap ic-openworld">🚗</div>
        <span class="card-name">Hill Climb</span>
      </a>

      <a class="card" href="https://abidalnafis.github.io/education/speechAI.html" target="_blank" id="card-speech">
        <div class="icon-wrap ic-speech">🎙️</div>
        <span class="card-name">SpeechAi</span>
      </a>

      <a class="card" href="https://abidalnafis.github.io/education.bd" target="_blank" id="card-education">
        <div class="icon-wrap ic-education">🎓</div>
        <span class="card-name">Education</span>
      </a>

      <a class="card" href="https://abidalnafis.github.io/education/maq2024.html" target="_blank" id="card-maq">
        <div class="icon-wrap ic-maq">📅</div>
        <span class="card-name">MAQ 2024</span>
      </a>

      <a class="card" href="https://abidalnafis.github.io/mbbs/classroutine.html" target="_blank" id="card-pmc">
        <div class="icon-wrap ic-pmc">🏥</div>
        <span class="card-name">Pmc Routine</span>
      </a>

      <a class="card" href="https://abidalnafis.github.io/ngo/index.html" target="_blank" id="card-ngo">
        <div class="icon-wrap ic-ngo">🤝</div>
        <span class="card-name">Ngo</span>
      </a>

      <a class="card" href="https://abidalnafis.github.io/education/messenger.html" target="_blank" id="card-bangla">
        <div class="icon-wrap ic-bangla">💬</div>
        <span class="card-name">Bangla Messenger</span>
      </a>

      <a class="card" href="https://abidalnafis.github.io/wish/birthday.html" target="_blank" id="card-wish">
        <div class="icon-wrap ic-wish">🎁</div>
        <span class="card-name">Wish</span>
      </a>

    </div>

    <footer>
      <p>Developed with <span>❤️</span> By Nafis</p>
    </footer>
  </div>

</body>

</html>
